<title>Iris</title>
<style>
  :root{
    --bg:#070b16; --bg2:#0a1020;
    --card:rgba(255,255,255,0.055);
    --card-2:rgba(255,255,255,0.085);
    --line:rgba(255,255,255,0.10);
    --text:#eef2fb; --dim:#9aa6bd; --faint:#62708c;
    --accent:#5b8cff; --cyan:#22d3ee; --violet:#a78bfa;
    --grad:linear-gradient(135deg,#5b8cff,#22d3ee);
    --grad-bv:linear-gradient(135deg,#5b8cff,#a78bfa);
    --ok:#34d399; --danger:#fb7185; --warn:#fbbf24;
    --iris1:#c4d4ff; --iris2:#7b9fff; --iris-glow:#5b8cff;
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
    --r:24px; --r-sm:16px; --r-xs:12px;
    --ease:cubic-bezier(.22,.9,.3,1);
    --t:.22s var(--ease);
    --glow:0 1px 0 rgba(255,255,255,0.05) inset,0 14px 40px rgba(0,0,0,0.45),0 0 34px rgba(91,140,255,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Inter,Roboto,sans-serif;
    color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;}
  input,textarea,[contenteditable]{-webkit-user-select:text;user-select:text;}
  button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;touch-action:manipulation;}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:
    radial-gradient(1100px 760px at 50% -12%, #1a2a6c 0%, transparent 52%),
    radial-gradient(900px 700px at 12% 0%, rgba(91,140,255,0.26), transparent 56%),
    radial-gradient(820px 640px at 112% 8%, rgba(167,139,250,0.22), transparent 54%),
    radial-gradient(760px 760px at 50% 122%, rgba(34,211,238,0.14), transparent 60%),
    var(--bg);}
  body::after{content:"";position:fixed;inset:-20%;z-index:-1;pointer-events:none;opacity:.55;
    background:radial-gradient(40% 40% at 30% 30%, rgba(91,140,255,0.12), transparent 70%),
               radial-gradient(38% 38% at 75% 60%, rgba(167,139,250,0.10), transparent 70%);
    animation:drift 26s ease-in-out infinite alternate;}
  @keyframes drift{0%{transform:translate3d(-2%,-1%,0) scale(1);}100%{transform:translate3d(3%,2%,0) scale(1.08);}}

  .app{max-width:600px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
    padding:calc(env(safe-area-inset-top,0) + var(--s5)) 0 0;}
  .screen{display:none;animation:enter .42s var(--ease) both;}
  .screen.on{display:block;flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    padding:0 var(--s4) calc(100px + env(safe-area-inset-bottom,0));}
  /* Inicio: estático; el calendario llena el alto disponible y se adapta */
  #s-inicio.on{display:flex;flex-direction:column;overflow:hidden;}
  .cal-card{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
  .cal-card .cal-grid{flex:1 1 auto;min-height:0;grid-template-rows:auto repeat(6,1fr);}
  .cal-card .cal-day{aspect-ratio:auto;}
  /* bloquear el scroll del fondo cuando hay una ventana abierta */
  body.modal-open .screen.on{overflow:hidden;}
  @keyframes enter{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--s3);margin-bottom:var(--s4);}
  .hello{font-size:13px;color:var(--dim);font-weight:500;}
  .h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:2px;}
  .date{font-size:12px;color:var(--faint);margin-top:3px;text-transform:capitalize;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:var(--s5);
    backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
    box-shadow:var(--glow);margin-bottom:var(--s4);}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4);}
  .card-t{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--dim);}

  .hero{padding-top:var(--s4);padding-bottom:var(--s4);}
  .hero .lbl{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
  .hero .amount{font-size:32px;font-weight:700;letter-spacing:-1px;margin:4px 0 2px;font-variant-numeric:tabular-nums;}
  .hero .sub{display:flex;gap:var(--s4);margin-top:var(--s3);}
  .hero .sub div{font-size:12px;color:var(--faint);}
  .hero .sub b{display:block;font-size:14px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums;}
  .up{color:var(--ok);} .down{color:var(--danger);}

  /* small tiles -> abren popups */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s3);margin-bottom:var(--s4);}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:var(--s4) var(--s2);
    text-align:center;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    transition:transform var(--t),box-shadow var(--t),border-color var(--t);position:relative;}
  .tile:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.4),0 0 26px rgba(91,140,255,.14);}
  .tile:active{transform:scale(.97);}
  .tile .tn{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;}
  .tile .tk{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.2;}
  .tile .tdot{position:absolute;top:10px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

  .row{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) 0;}
  .row + .row{border-top:1px solid var(--line);}
  .check{width:22px;height:22px;border-radius:7px;border:2px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--t);}
  .check.done{background:var(--grad);border-color:transparent;}
  .check svg{width:13px;height:13px;color:#fff;}
  .row-main{flex:1;min-width:0;}
  .row-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row.done .row-title{text-decoration:line-through;color:var(--faint);}
  .row-sub{font-size:11px;color:var(--faint);margin-top:1px;}
  .row-time{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;flex-shrink:0;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .x-row{width:26px;height:26px;border-radius:8px;color:var(--faint);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:color var(--t),background var(--t);}
  .x-row:active{color:var(--danger);background:var(--card-2);}
  .empty{color:var(--faint);font-size:13px;padding:var(--s4) 0;text-align:center;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s2);border-radius:999px;padding:12px 18px;font-size:14px;font-weight:600;
    background:var(--card-2);border:1px solid var(--line);color:var(--text);transition:transform var(--t),box-shadow var(--t),background var(--t);}
  .btn:hover{transform:translateY(-1px) scale(1.02);}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 8px 22px rgba(91,140,255,.4);}
  .btn.block{width:100%;}
  .btn.ghost{background:transparent;}
  .btn.sm{padding:9px 14px;font-size:13px;}
  .seg{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;margin-bottom:var(--s4);overflow-x:auto;scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:1;white-space:nowrap;padding:9px 12px;border-radius:999px;font-size:13px;font-weight:600;color:var(--dim);transition:all var(--t);}
  .seg button.on{background:var(--grad);color:#fff;}
  /* Finanzas: métricas + sparklines + salud financiera */
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s3);margin-bottom:var(--s4);}
  .metric{padding:var(--s3) var(--s3) 10px;}
  .metric .lbl{font-size:11px;}
  .metric .mval{font-size:17px;font-weight:700;margin:4px 0 7px;font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
  .metric .mval.up{color:var(--ok);} .metric .mval.down{color:var(--danger);}
  .spark{height:26px;} .spark svg{display:block;width:100%;height:26px;}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:var(--s3) 0 var(--s4);}
  .gauge-wrap svg{filter:drop-shadow(0 8px 22px rgba(91,140,255,.32));}
  .donut-fg{transition:stroke-dashoffset 1.1s var(--ease);}
  .gauge-cap{font-size:11px;color:var(--faint);text-align:center;max-width:210px;line-height:1.4;}
  .tip{font-size:13px;color:var(--dim);line-height:1.5;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .seg-modal{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;}
  .seg-modal button{flex:1;padding:11px 8px;border-radius:999px;font-size:13px;font-weight:600;color:var(--dim);transition:all var(--t);white-space:nowrap;}
  .seg-modal button.on{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(91,140,255,.35);}
  /* análisis financiero + listado + resumen de día */
  .tap{cursor:pointer;} .tap:active{transform:scale(.99);}
  .day-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);margin:var(--s3) 0;}
  .day-sum{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center;}
  .day-sum .lbl{font-size:10px;} .day-sum .v{font-size:15px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;}
  .fin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s3);margin-bottom:var(--s3);}
  .fin-stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .fin-stat .lbl{font-size:11px;} .fin-val{font-size:18px;font-weight:700;margin:3px 0;font-variant-numeric:tabular-nums;} .fin-sub{font-size:11px;color:var(--faint);}
  .fin-bar-row{margin-bottom:11px;}
  .fin-bar-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;gap:8px;}
  .fin-bar-cat{display:flex;align-items:center;gap:6px;color:var(--text);min-width:0;} .fin-bar-amt{color:var(--dim);white-space:nowrap;}
  .cat-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .fin-bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
  .fin-bar-fill{height:100%;border-radius:99px;transition:width .6s var(--ease);}
  .fin-insight{font-size:13px;color:var(--dim);line-height:1.5;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:var(--s3);}
  .plan-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);gap:10px;}
  .plan-row:last-child{border-bottom:none;}
  .plan-name{font-size:13px;font-weight:600;} .plan-desc{font-size:11px;color:var(--faint);margin-top:2px;} .plan-amt{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .section-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin:var(--s4) 0 var(--s2);}
  .txcat-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:var(--s3);padding-bottom:2px;}
  .txcat-bar::-webkit-scrollbar{display:none;}
  .txcat-chip{white-space:nowrap;padding:7px 12px;border-radius:99px;font-size:12px;font-weight:600;color:var(--dim);background:var(--card);border:1px solid var(--line);display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .txcat-chip.on{background:var(--grad);color:#fff;border-color:transparent;}
  /* Ajustes */
  #aj-panel .card{margin-bottom:var(--s4);}
  .aj-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
  .aj-row:first-child{padding-top:2px;} .aj-row:last-child{border-bottom:none;padding-bottom:2px;}
  .aj-row .aj-l{font-size:14px;font-weight:600;color:var(--text);} .aj-row .aj-d{font-size:12px;color:var(--faint);margin-top:2px;line-height:1.4;}
  .toggle{width:48px;height:28px;border-radius:99px;background:var(--card-2);border:1px solid var(--line);position:relative;flex-shrink:0;transition:background var(--t),border-color var(--t);}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform var(--t);box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .toggle.on{background:var(--grad);border-color:transparent;} .toggle.on::after{transform:translateX(20px);}
  .swatches{display:flex;gap:11px;flex-wrap:wrap;}
  .swatch{width:30px;height:30px;border-radius:50%;border:2px solid transparent;transition:transform var(--t);}
  .swatch:active{transform:scale(.9);} .swatch.on{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.25);}
  .cat-list{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
  .cat-item{display:flex;align-items:center;gap:8px;}
  .cat-item .cat-dot{width:11px;height:11px;}
  .cat-item input{flex:1;min-width:0;min-height:44px;padding:10px 12px;font-size:15px;color:var(--text);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.13);border-radius:12px;outline:none;}
  .cat-item input:focus{border-color:rgba(91,140,255,.6);}
  .cat-x{width:38px;height:38px;flex-shrink:0;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--danger);font-size:17px;display:flex;align-items:center;justify-content:center;}
  .cat-add{display:flex;gap:8px;margin-top:10px;}
  .cat-add input{flex:1;min-width:0;min-height:44px;padding:10px 12px;font-size:15px;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;outline:none;}
  .cat-add button{flex-shrink:0;padding:0 16px;border-radius:12px;background:var(--grad);color:#fff;font-weight:600;font-size:14px;}
  .cat-move{width:38px;height:38px;flex-shrink:0;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--text-dim);font-size:14px;display:flex;align-items:center;justify-content:center;}
  .cat-move:disabled{opacity:.3;}
  details.collap{padding:0;overflow:hidden;}
  details.collap>summary{list-style:none;cursor:pointer;padding:15px 16px;font-weight:600;font-size:14px;color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  details.collap>summary::-webkit-details-marker{display:none;}
  details.collap>summary::after{content:"";width:8px;height:8px;border-right:2px solid var(--text-faint);border-bottom:2px solid var(--text-faint);border-radius:0 0 2px 0;transform:rotate(45deg) translateY(-2px);transition:transform .25s ease;margin-right:4px;flex-shrink:0;}
  details.collap[open]>summary::after{transform:rotate(225deg) translateY(-1px);}
  details.collap>.collap-b{padding:0 16px 16px;}
  body.no-anim .screen{animation:none!important;}
  body.no-anim .donut-fg,body.no-anim .fin-bar-fill,body.no-anim .cal-dots i,body.no-anim .row,body.no-anim .card{animation:none!important;transition:none!important;}

  /* bottom nav frosted pill + orbe central vivo */
  .navwrap{position:fixed;left:0;right:0;bottom:0;z-index:55;display:flex;justify-content:center;
    padding:0 var(--s4) calc(env(safe-area-inset-bottom,0) + 10px);pointer-events:none;}
  .nav{pointer-events:auto;display:flex;align-items:center;justify-content:space-around;gap:var(--s2);
    width:100%;max-width:420px;padding:10px var(--s3);border-radius:999px;position:relative;
    background:rgba(10,15,26,0.72);border:1px solid var(--line);
    backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
    box-shadow:0 16px 40px rgba(0,0,0,.5);}
  .nav .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10px;font-weight:600;flex:1;padding:4px;transition:color var(--t),transform var(--t);}
  .nav .tab.on{color:var(--text);}
  .nav .tab:active{transform:scale(.9);}
  .nav .tab svg{width:23px;height:23px;}
  .nav .tab.on svg{filter:drop-shadow(0 0 8px rgba(91,140,255,.6));}
  .nav .orbslot{flex:0 0 auto;width:72px;display:flex;justify-content:center;align-items:center;}
  .orb-btn{width:60px;height:60px;margin-top:-28px;align-self:center;border-radius:50%;position:relative;flex-shrink:0;
    box-shadow:0 10px 26px rgba(91,140,255,.6),0 0 32px rgba(167,139,250,.55);
    transition:transform var(--t);}
  .orb-btn:active{transform:scale(.92);}
  /* orbe Iris = ícono fluido (referencia) */
  .orb{display:block;width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;
    background:radial-gradient(circle at 50% 32%,rgba(150,176,224,.5) 0%,rgba(95,110,178,.42) 46%,rgba(72,70,134,.5) 78%,rgba(38,40,80,.58) 100%);
    -webkit-backdrop-filter:blur(6px) saturate(1.25);backdrop-filter:blur(6px) saturate(1.25);
    animation:orbBreathe 4.5s ease-in-out infinite;}
  .orb-spin{position:absolute;inset:-12%;z-index:1;animation:orbSpin 13s linear infinite;will-change:transform;}
  .orb-b1,.orb-b2,.orb-sheen{position:absolute;border-radius:50%;}
  .orb-b1{width:60%;height:60%;left:12%;top:8%;filter:blur(7px);
    background:radial-gradient(circle,rgba(190,216,250,.62) 0%,rgba(190,216,250,0) 66%);animation:orbDrift1 6s ease-in-out infinite;}
  .orb-b2{width:52%;height:52%;right:10%;bottom:10%;filter:blur(7px);
    background:radial-gradient(circle,rgba(196,176,236,.52) 0%,rgba(196,176,236,0) 64%);animation:orbDrift2 7.5s ease-in-out infinite;}
  .orb-sheen{inset:6%;background:conic-gradient(from 0deg,rgba(255,255,255,0) 0deg,rgba(185,210,250,.20) 70deg,rgba(255,255,255,0) 150deg,rgba(175,155,225,.17) 250deg,rgba(255,255,255,0) 330deg);}
  .orb::before{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;
    box-shadow:inset 0 -8px 16px rgba(14,10,38,.45),inset 0 6px 14px rgba(170,200,245,.25),inset 0 0 0 1px rgba(200,220,255,.14);}
  .orb::after{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3;
    background:radial-gradient(36% 28% at 35% 24%,rgba(255,255,255,.52),rgba(255,255,255,0) 70%);}
  @keyframes orbSpin{to{transform:rotate(360deg);}}
  @keyframes orbBreathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  @keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(10%,9%) scale(1.12);}}
  @keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1.05);}50%{transform:translate(-9%,-8%) scale(.9);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

  /* ===== popups (ventanas emergentes con entrada/salida) ===== */
  .overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:var(--s4);
    background:rgba(3,6,14,0.62);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    opacity:0;pointer-events:none;transition:opacity .24s var(--ease);}
  .overlay.open{opacity:1;pointer-events:auto;}
  .pop{width:100%;max-width:460px;max-height:86vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    background:rgba(16,22,38,0.82);border:1px solid var(--line);border-radius:26px;padding:var(--s5);
    backdrop-filter:blur(30px) saturate(1.3);-webkit-backdrop-filter:blur(30px) saturate(1.3);
    box-shadow:0 24px 70px rgba(0,0,0,.55),var(--glow);
    transform:scale(.9) translateY(12px);opacity:0;transition:transform .3s var(--ease),opacity .24s var(--ease);}
  .overlay.open .pop{transform:none;opacity:1;}
  .overlay.closing .pop{transform:scale(.94) translateY(8px);opacity:0;}
  .pop-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4);}
  .pop-t{font-size:18px;font-weight:700;}
  .pop-x{width:32px;height:32px;border-radius:50%;background:var(--card-2);border:1px solid var(--line);color:var(--dim);font-size:18px;display:flex;align-items:center;justify-content:center;}
  .field{margin-bottom:var(--s3);}
  .field label{display:block;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:6px;}
  .field input,.field select{width:100%;min-width:0;max-width:100%;min-height:50px;padding:13px 14px;font-size:16px;color:var(--text);
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.028));border:1px solid rgba(255,255,255,.14);border-radius:var(--r-sm);outline:none;
    backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);box-shadow:inset 0 1px 0 rgba(255,255,255,.09);
    transition:border-color var(--t),box-shadow var(--t),background var(--t);}
  .field input::placeholder{color:var(--faint);}
  .field input:focus,.field select:focus{border-color:rgba(91,140,255,.6);box-shadow:0 0 0 3px rgba(91,140,255,.18);}
  .field input[type="date"],.field input[type="time"]{-webkit-appearance:none;appearance:none;text-align:left;}
  .field input[type="date"]::-webkit-date-and-time-value{text-align:left;}
  .field-row{display:flex;gap:var(--s3);} .field-row>*{flex:1 1 0;min-width:0;}
  @media (max-width:380px){ .pop{padding:var(--s4);} .field-row{flex-direction:column;} }
  /* mini chart */
  .chart{margin-top:14px;width:100%;}
  .chart svg{width:100%;height:54px;display:block;overflow:visible;}
  .chart-empty{margin-top:12px;font-size:12px;color:var(--faint);}
  /* recomendaciones */
  .reco{display:flex;gap:11px;padding:11px 0;}
  .reco + .reco{border-top:1px solid var(--line);}
  .reco .ri{width:30px;height:30px;border-radius:9px;background:var(--card-2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .reco .rt{flex:1;font-size:13px;line-height:1.45;}
  .reco .rt b{color:var(--accent);}
  .chips{display:flex;gap:var(--s2);flex-wrap:wrap;}
  .ch{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--line);color:var(--dim);transition:all var(--t);display:inline-flex;align-items:center;gap:6px;}
  .ch .ico{width:16px;height:16px;color:var(--accent);}
  .ch.on{background:var(--grad);border-color:transparent;color:#fff;}
  .pop-actions{display:flex;gap:var(--s3);margin-top:var(--s4);}

  /* ===== calendario (glass) ===== */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s3);}
  .cal-title{font-size:16px;font-weight:700;text-transform:capitalize;}
  .cal-nav{display:flex;gap:6px;}
  .cal-nav button{width:32px;height:32px;border-radius:50%;background:var(--card-2);border:1px solid var(--line);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:15px;}
  .cal-nav button[data-cal="0"]{width:auto;min-width:46px;padding:0 13px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.2px;}
  .cal-nav button:active{transform:scale(.9);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{font-size:10px;color:var(--faint);text-align:center;text-transform:uppercase;font-weight:600;padding-bottom:4px;}
  .cal-day{aspect-ratio:1.2;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
    font-size:13px;color:var(--text);position:relative;background:transparent;border:1px solid transparent;transition:all var(--t);}
  .cal-day.empty{visibility:hidden;}
  .cal-day.has{background:transparent;border-color:transparent;}
  .cal-day.today{box-shadow:inset 0 0 0 1.5px var(--accent);}
  .cal-day.sel{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(91,140,255,.4);}
  .cal-day:active{transform:scale(.92);}
  .cal-dots{position:absolute;bottom:5px;left:0;right:0;display:flex;justify-content:center;gap:3px;height:6px;pointer-events:none;}
  .cal-dots i{width:6px;height:6px;border-radius:50%;display:block;background:currentColor;animation:dotin .4s var(--ease) both;box-shadow:0 0 5px currentColor;}
  @keyframes dotin{from{transform:scale(0);opacity:0;}to{transform:none;opacity:1;}}

  /* ===== agenda (lista de días) ===== */
  .ag-add{width:40px;height:40px;border-radius:50%;background:var(--card-2);border:1px solid var(--line);color:var(--text);font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--t);}
  .ag-add:active{transform:scale(.9);}
  .ag-month{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:var(--s3);}
  .ag-day{display:flex;gap:14px;padding:14px 0;}
  .ag-day + .ag-day{border-top:1px solid var(--line);}
  .ag-date{width:44px;flex-shrink:0;text-align:center;padding-top:6px;}
  .ag-dow{font-size:11px;color:var(--dim);text-transform:uppercase;font-weight:600;}
  .ag-num{font-size:23px;font-weight:700;line-height:1;margin-top:3px;font-variant-numeric:tabular-nums;}
  .ag-date.today .ag-num{color:var(--accent);}
  .ag-date.overdue .ag-num{color:var(--danger);}
  .ag-items{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;}
  .ag-ev{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:14px;background:var(--card-2);border:1px solid var(--line);transition:transform var(--t);}
  .ag-ev.timed{background:var(--grad-bv);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(91,140,255,.32);}
  .ag-ev .ag-t{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ag-ev .ag-time{font-size:12px;font-weight:600;opacity:.8;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .ag-ev.timed .ag-time{opacity:.95;}
  .ag-task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:var(--card);border:1px solid var(--line);}
  .ag-task .ag-t{flex:1;min-width:0;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ag-task.done .ag-t{text-decoration:line-through;color:var(--faint);}
  .ag-x{width:24px;height:24px;border-radius:7px;color:inherit;opacity:.55;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .ag-x:active{opacity:1;}
  .ag-none{font-size:13px;color:var(--faint);padding:11px 14px;border-radius:14px;background:var(--card);border:1px dashed var(--line);}

  /* ===== savings / deudas / prestamos ===== */
  .sv{position:relative;overflow:hidden;border-radius:20px;padding:18px;margin-bottom:var(--s3);
    background:linear-gradient(155deg,rgba(91,140,255,0.16),rgba(20,28,46,0.5) 62%),var(--card-2);
    border:1px solid var(--line);box-shadow:0 10px 32px rgba(0,0,0,.3);}
  .sv::before{content:"";position:absolute;top:-45%;right:-28%;width:72%;height:72%;border-radius:50%;
    background:radial-gradient(circle,rgba(91,140,255,0.3),transparent 70%);pointer-events:none;}
  .sv>*{position:relative;}
  .sv-h{display:flex;align-items:center;justify-content:space-between;}
  .sv-name{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
  .sv-num{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-top:6px;font-variant-numeric:tabular-nums;}
  .sv-sub{font-size:12px;color:var(--faint);margin-top:2px;}
  .sv-track{height:9px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;margin-top:14px;}
  .sv-fill{height:100%;border-radius:999px;background:var(--grad-bv);box-shadow:0 0 12px rgba(91,140,255,.5);transition:width .6s var(--ease);}
  .sv-meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .sv-lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;}
  .sv-lbl b{display:block;color:var(--text);font-size:13px;font-weight:600;margin-top:2px;text-transform:none;letter-spacing:0;font-variant-numeric:tabular-nums;}
  .sv-pill{font-size:13px;font-weight:700;color:#cdd9ff;background:rgba(91,140,255,.2);border:1px solid rgba(91,140,255,.34);padding:4px 12px;border-radius:999px;}
  .sv-act{display:flex;gap:var(--s2);margin-top:14px;}
  .sv-btn{flex:1;text-align:center;font-size:13px;font-weight:600;padding:10px;border-radius:13px;background:rgba(255,255,255,.08);color:var(--text);transition:transform var(--t),background var(--t);}
  .sv-btn:active{transform:scale(.96);}
  .sv-btn.accent{background:var(--grad);color:#fff;}
  .sv-carousel{display:grid;grid-auto-flow:column;grid-auto-columns:100%;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -2px;padding:2px;}
  .sv-carousel::-webkit-scrollbar{display:none;}
  .sv-carousel .sv{min-width:0;scroll-snap-align:center;margin-bottom:0;box-sizing:border-box;}
  .sv-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
  .sv-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);transition:all var(--t);}
  .sv-dots i.on{background:var(--accent);width:18px;border-radius:3px;}
  .dp-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .dp-tab{flex:1;padding:9px;border-radius:12px;font-size:13px;font-weight:600;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);transition:all var(--t);}
  .dp-tab.on{background:var(--grad);color:#fff;border-color:transparent;}
  .dp-carousel{display:grid;grid-auto-flow:column;grid-auto-columns:100%;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .dp-carousel::-webkit-scrollbar{display:none;}
  .dp-slide{min-width:0;scroll-snap-align:center;display:flex;flex-direction:column;}
  .dp-carousel .btn.primary,.sv-carousel .btn.primary{box-shadow:0 6px 18px rgba(0,0,0,.45);}
  .dp-h{font-size:13px;color:var(--dim);margin-bottom:10px;}
  .debt{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) 0;}
  .debt + .debt{border-top:1px solid var(--line);}
  .debt-ico{width:38px;height:38px;border-radius:12px;background:var(--card-2);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
  .debt-amt{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;flex-shrink:0;}

  .mv-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--card-2);color:var(--accent);}
  .ico{width:20px;height:20px;display:block;}
  .mv-ico .ico{width:20px;height:20px;}
  .debt-ico .ico{width:19px;height:19px;}
  .x-row .ico{width:18px;height:18px;}
  .sv-ico{display:inline-flex;vertical-align:-3px;margin-right:6px;color:var(--accent);}
  .sv-ico .ico{width:15px;height:15px;}
  .mv-amt{font-weight:600;font-size:14px;font-variant-numeric:tabular-nums;flex-shrink:0;}

  /* ===== IRIS overlay (hablar con Iris) ===== */
  .iris{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 34%,rgba(91,140,255,0.20),transparent 58%),rgba(6,9,20,0.96);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    opacity:0;pointer-events:none;transition:opacity .3s var(--ease);}
  .iris.open{opacity:1;pointer-events:auto;}
  .iris-top{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0) + 14px) var(--s4) 6px;}
  .iris-name{font-size:14px;font-weight:700;letter-spacing:1px;color:var(--dim);}
  .iris-gear,.iris-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text);display:flex;align-items:center;justify-content:center;}
  .iris-gear svg,.iris-close svg{width:18px;height:18px;}
  .iris-body{flex:1;display:flex;flex-direction:column;min-height:0;}
  /* chat mode */
  .iris-chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--s4);display:flex;flex-direction:column;gap:var(--s3);}
  .msg{max-width:86%;padding:12px 15px;border-radius:20px;font-size:14px;line-height:1.5;white-space:pre-wrap;animation:pop .3s var(--ease) both;}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  .msg.me{align-self:flex-end;background:var(--grad);color:#fff;border-bottom-right-radius:7px;}
  .msg.ai{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--line);border-bottom-left-radius:7px;}
  .msg.ai b{color:#ffb784;font-weight:700;}
  .iris-qs{display:flex;gap:var(--s2);flex-wrap:wrap;padding:0 var(--s4) var(--s2);}
  /* glowing ask bar (ref: hablar con iris) */
  .askwrap{position:relative;margin:6px var(--s4) calc(env(safe-area-inset-bottom,0) + 14px);}
  .askglow{position:absolute;inset:-2px;border-radius:24px;z-index:0;filter:blur(14px);opacity:.8;
    background:linear-gradient(90deg,rgba(91,140,255,.6),rgba(34,211,238,.5) 50%,rgba(167,139,250,.6));animation:glowmove 6s ease-in-out infinite alternate;}
  @keyframes glowmove{0%{transform:translateX(-3%);}100%{transform:translateX(3%);}}
  .ask{position:relative;z-index:1;display:flex;align-items:center;gap:var(--s2);
    background:rgba(10,12,18,0.92);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:8px 8px 8px 16px;}
  .ask input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;padding:8px 0;}
  .ask input::placeholder{color:var(--faint);}
  .ask-voice{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--dim);padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);}
  .ask-send{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#5b8cff,#a855f7);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform var(--t);}
  .ask-send:active{transform:scale(.9);}
  .ask svg{width:18px;height:18px;}
  /* voice mode */
  .iris-voice{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:var(--s4);padding:var(--s5);}
  .iris.voice .iris-chat,.iris.voice .iris-qs,.iris.voice .askwrap{display:none;}
  .iris-actions{display:flex;align-items:center;gap:6px;}
  .iris-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);}
  .iris-ico svg{width:18px;height:18px;}
  .iris-ico:active{transform:scale(.92);}
  .msg.ai{position:relative;}
  .msg-save{position:absolute;bottom:-9px;right:-6px;width:26px;height:26px;border-radius:50%;background:var(--card-2);border:1px solid var(--line);color:var(--faint);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);}
  .msg-save svg{width:13px;height:13px;}
  .msg-save.on{color:var(--accent);border-color:var(--accent);}
  .iris-saved{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--s4);flex-direction:column;gap:var(--s3);}
  .iris.saved .iris-chat,.iris.saved .iris-qs,.iris.saved .askwrap,.iris.saved .iris-voice{display:none;}
  .iris.saved .iris-saved{display:flex;}
  .saved-head{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .saved-head .saved-back{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--text);background:rgba(255,255,255,.06);border:1px solid var(--line);}
  .saved-head .saved-back svg{width:18px;height:18px;}
  .saved-head .saved-t{font-size:17px;font-weight:700;}
  .saved-item{position:relative;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:14px 40px 14px 14px;font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .saved-item b{color:#ffb784;font-weight:700;}
  .saved-item .saved-date{display:block;margin-top:8px;font-size:11px;color:var(--faint);}
  .saved-item .x-row{position:absolute;top:10px;right:10px;}
  .iris.voice .iris-voice{display:flex;}
  .vorb{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
  .vorb .vglow{position:absolute;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,rgba(91,140,255,0.55),rgba(167,139,250,0.14) 60%,transparent 72%);filter:blur(6px);animation:breathe 3.4s ease-in-out infinite;}
  .vring{position:absolute;width:150px;height:150px;}
  .vring i{position:absolute;top:50%;left:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#dbe7ff,#5b8cff 70%);box-shadow:0 0 8px rgba(91,140,255,.85);animation:vdot 2.6s ease-in-out infinite;}
  @keyframes vdot{0%,100%{opacity:.5;}50%{opacity:1;}}
  .iris.listening .vring i{animation-duration:.9s;}
  .vstatus{color:#bcd0ff;font-size:16px;font-weight:600;text-shadow:0 1px 12px rgba(91,140,255,.4);}
  .vheard{color:rgba(255,255,255,.6);font-size:14px;font-style:italic;text-align:center;min-height:18px;}
  .vctrl{display:flex;align-items:center;gap:34px;margin-top:var(--s4);}
  .vc{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#fff;display:flex;align-items:center;justify-content:center;transition:transform var(--t);}
  .vc:active{transform:scale(.92);}
  .vc svg{width:22px;height:22px;}
  .vmic{width:78px;height:78px;border-radius:50%;border:none;color:#fff;background:linear-gradient(140deg,#5b8cff,#a78bfa);box-shadow:0 8px 30px rgba(91,140,255,.5);display:flex;align-items:center;justify-content:center;transition:transform var(--t);}
  .vmic svg{width:30px;height:30px;}
  .vmic:active{transform:scale(.94);}
  .iris.listening .vmic{animation:vpulse 1.3s infinite;}
  @keyframes vpulse{0%{box-shadow:0 0 0 0 rgba(91,140,255,.55);}70%{box-shadow:0 0 0 22px rgba(91,140,255,0);}100%{box-shadow:0 0 0 0 rgba(91,140,255,0);}}

  .muted{color:var(--dim);font-size:13px;line-height:1.5;}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
  .svc-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;vertical-align:middle;margin-left:4px}
  .svc-tag.over{background:rgba(255,107,107,.18);color:#ff6b6b}
  .svc-tag.today{background:rgba(255,200,97,.2);color:#ffc861}
  .svc-tag.soon{background:rgba(91,140,255,.18);color:var(--accent)}
  .svc-tag.paid{background:rgba(61,220,151,.16);color:#3ddc97}
  .svc-tag.ok{background:rgba(255,255,255,.07);color:#8b93a7}
</style>
</head>
<body>
<div class="app">

  <!-- INICIO -->
  <section class="screen on" id="s-inicio">
    <div class="top"><div><div class="hello" id="hello">Hola</div><div class="h1">Tu día</div><div class="date" id="today-date"></div></div></div>
    <div class="card hero" data-go="finanzas">
      <div class="lbl">Balance del mes</div>
      <div class="amount" id="balance">$0</div>
      <div class="sub"><div>Ingresos<b class="up" id="m-income">$0</b></div><div>Gastos<b class="down" id="m-expense">$0</b></div><div>Ahorro<b id="m-rate">0%</b></div></div>
      <div class="chart" id="home-chart"></div>
    </div>
    <div class="tiles">
      <button class="tile" data-act="go-tasks"><div class="tn" id="t-tasks">0</div><div class="tk">Tareas hoy</div></button>
      <button class="tile" data-pop="eventos"><div class="tn" id="t-events">0</div><div class="tk">Eventos hoy</div></button>
      <button class="tile" data-pop="compras"><div class="tn" id="t-shop">0</div><div class="tk">Compras</div></button>
    </div>
    <div id="home-services"></div>
    <div class="card cal-card">
      <div class="cal-head"><div class="cal-title" id="home-cal-title">—</div>
        <div class="cal-nav"><button data-cal="-1">‹</button><button data-cal="0">Hoy</button><button data-cal="1">›</button></div></div>
      <div class="cal-grid" id="home-cal-grid"></div>
    </div>
  </section>

  <!-- AGENDA (calendario glass + lista) -->
  <section class="screen" id="s-agenda">
    <div class="top"><div><div class="hello">Tu tiempo</div><div class="h1">Agenda</div></div>
      <button class="ag-add" data-act="add" aria-label="Agregar">+</button></div>
    <div class="seg" id="ag-seg"><button data-agtab="agenda" class="on">Agenda</button><button data-agtab="tareas">Tareas</button></div>
    <div id="ag-view-agenda">
      <div class="card">
        <div class="cal-head"><div class="cal-title" id="cal-title">—</div>
          <div class="cal-nav"><button data-cal="-1">‹</button><button data-cal="0">Hoy</button><button data-cal="1">›</button></div></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="card"><div id="ag-list"></div></div>
    </div>
    <div id="ag-view-tareas" style="display:none">
      <div class="card"><div id="ag-tasks"></div></div>
    </div>
  </section>

  <!-- FINANZAS -->
  <section class="screen" id="s-finanzas">
    <div class="top"><div><div class="hello">Tus números</div><div class="h1">Finanzas</div></div></div>
    <div class="card hero">
      <div class="lbl">Balance del mes</div>
      <div class="amount" id="f-balance">$0</div>
      <div class="sub"><div>Ingresos<b class="up" id="f-income">$0</b></div><div>Gastos<b class="down" id="f-expense">$0</b></div><div>Tasa de ahorro<b id="f-rate">0%</b></div></div>
    </div>
    <div class="metric-grid">
      <div class="card metric tap" data-act="open-txlist" data-v="income"><div class="lbl">Ingresos</div><div class="mval up" id="mc-income">$0</div><div class="spark" id="spark-income"></div></div>
      <div class="card metric tap" data-act="open-txlist" data-v="expense"><div class="lbl">Gastos</div><div class="mval down" id="mc-expense">$0</div><div class="spark" id="spark-expense"></div></div>
      <div class="card metric tap" data-act="open-txlist" data-v="all"><div class="lbl">Balance</div><div class="mval" id="mc-balance">$0</div><div class="spark" id="spark-balance"></div></div>
    </div>
    <div id="fin-mov-wrap"></div>
    <div class="card health-card tap" data-act="open-analysis">
      <div class="cal-head" style="margin-bottom:4px"><div class="card-t" style="margin:0">Salud financiera del mes</div><span class="see-more" style="font-size:11px;color:var(--accent);font-weight:600">ver análisis ›</span></div>
      <div class="gauge-wrap"><div id="gauge"></div><div class="gauge-cap" id="gauge-cap"></div></div>
      <div class="tip" id="tip"></div>
    </div>
    <div id="fin-ahorros-wrap"></div>
    <div id="fin-deudas-wrap"></div>
    <div id="fin-tjsv-wrap"></div>
  </section>

  <!-- AJUSTES -->
  <section class="screen" id="s-ajustes">
    <div class="top"><div><div class="hello">Preferencias</div><div class="h1">Ajustes</div></div></div>
    <div class="seg" id="aj-seg">
      <button data-ajtab="general" class="on">General</button>
      <button data-ajtab="conectividad">Conectividad</button>
      <button data-ajtab="personalizacion">Personalización</button>
    </div>
    <div id="aj-panel"></div>
  </section>
</div>

<!-- bottom nav -->
<div class="navwrap"><nav class="nav">
  <button class="tab on" data-go="inicio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Inicio</button>

/* ---- recordatorios -> calendario nativo (.ics, Apple/Google) ---- */
function icsEsc(s){ return String(s||"").replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n"); }
function _remMin(){ const m=(S.set&&S.set.remindMin); return (m===0||m>0)?m:30; }
function eventICS(ev){
  const d=(ev.date||todayISO()).replace(/-/g,"");
  const stamp=new Date().toISOString().replace(/[-:]/g,"").replace(/\.\d+/,"");
  let dt,trig; const rm=_remMin();
  if(ev.time){ const t=ev.time.replace(":","")+"00"; dt="DTSTART:"+d+"T"+t+"\r\nDTEND:"+d+"T"+t; trig="-PT"+rm+"M"; }
  else { dt="DTSTART;VALUE=DATE:"+d; trig="PT9H"; }
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Iris//Agenda//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT","UID:"+ev.id+"@iris.app","DTSTAMP:"+stamp,dt,"SUMMARY:"+icsEsc(ev.title),
    ev.note?("DESCRIPTION:"+icsEsc(ev.note)):null,
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(ev.title),"TRIGGER:"+trig,"END:VALARM",
    "END:VEVENT","END:VCALENDAR"].filter(Boolean).join("\r\n");
}
function taskICS(t){
  const d=(t.date||todayISO()).replace(/-/g,"");
  const stamp=new Date().toISOString().replace(/[-:]/g,"").replace(/\.\d+/,"");
  let dt,trig; const rm=_remMin();
  if(t.time&&/^\d{1,2}:\d{2}/.test(t.time)){ const tt=t.time.slice(0,5).replace(":","")+"00"; dt="DTSTART:"+d+"T"+tt+"\r\nDTEND:"+d+"T"+tt; trig="-PT"+rm+"M"; }
  else { dt="DTSTART;VALUE=DATE:"+d; trig="PT9H"; }
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Iris//Tareas//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT","UID:task-"+t.id+"@iris.app","DTSTAMP:"+stamp,dt,"SUMMARY:"+icsEsc("✓ "+(t.title||"Tarea")),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(t.title||"Tarea"),"TRIGGER:"+trig,"END:VALARM",
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
}
function remindTask(id){ const t=S.tasks.find(x=>x.id===id); if(t)dlICS(taskICS(t),"recordatorio_"+(t.title||"tarea")); }
function addToCalendar(id){
  const ev=S.events.find(e=>e.id===id); if(!ev)return;
  const blob=new Blob([eventICS(ev)],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=((ev.title||"evento").replace(/[^\w\-]+/g,"_")||"evento")+".ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function dlICS(text,name){ const blob=new Blob([text],{type:"text/calendar;charset=utf-8"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=((name||"iris").replace(/[^\w\-]+/g,"_")||"iris")+".ics"; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),3000); }

/* ====================== SERVICIOS FIJOS ====================== */
function _dim(y,m){ return new Date(y,m+1,0).getDate(); }
function svcDueDate(svc,off){ const n=new Date(); const ref=new Date(n.getFullYear(),n.getMonth()+(off||0),1); const y=ref.getFullYear(),m=ref.getMonth(); const day=Math.min(Math.max(1,+svc.day||1),_dim(y,m)); return new Date(y,m,day); }
function svcInfo(svc){ const tm=thisMonth(); const paid=svc.lastPaid===tm; const today=new Date(); today.setHours(0,0,0,0); let due=svcDueDate(svc,0); if(paid)due=svcDueDate(svc,1); const diff=Math.round((due-today)/86400000); let status=paid?"pagado":diff<0?"vencido":diff===0?"hoy":diff<=5?"pronto":"ok"; return {paid,due,diff,status}; }
function pendingServices(){ return S.services.filter(s=>{ const st=svcInfo(s).status; return st==="vencido"||st==="hoy"||st==="pronto"; }).sort((a,b)=>svcInfo(a).diff-svcInfo(b).diff); }
function _svcTag(inf,svc){ return inf.status==="pagado"?`<span class="svc-tag paid">Pagado</span>`:inf.status==="vencido"?`<span class="svc-tag over">Vencido</span>`:inf.status==="hoy"?`<span class="svc-tag today">Hoy</span>`:inf.status==="pronto"?`<span class="svc-tag soon">En ${inf.diff} día${inf.diff===1?"":"s"}</span>`:`<span class="svc-tag ok">Día ${Math.min(+svc.day||1,28)}</span>`; }
function serviceRow(s){ const inf=svcInfo(s);
  return `<div class="row"><span class="mv-ico">${svgIco("receipt")}</span><div class="row-main" data-act="edit-service" data-id="${s.id}" style="cursor:pointer"><div class="row-title">${esc(s.name)} ${_svcTag(inf,s)}</div><div class="row-sub">${money(s.amount)} · todos los ${(+s.day||1)}${s.method?(" · "+esc(s.method)):""}</div></div>`
    +(inf.paid?"":`<button class="sv-btn accent" data-act="pay-service" data-id="${s.id}" style="width:auto;padding:8px 12px;margin-right:6px">Pagar</button>`)
    +`<button class="x-row" data-act="cal-service" data-id="${s.id}" title="Recordarme" style="color:var(--accent)">${svgIco("bell")}</button>`
    +`<button class="x-row" data-act="del-service" data-id="${s.id}">×</button></div>`; }
function payService(id){ const s=S.services.find(x=>x.id===id); if(!s)return; S.moves.push({id:uid(),type:"gasto",amount:+s.amount||0,cat:"Servicios",method:s.method||"transferencia",title:s.name,date:todayISO()}); s.lastPaid=thisMonth(); save(); render(); }
function svcICS(svc){ const due=svcDueDate(svc,0); const d=iso(due).replace(/-/g,""); const stamp=new Date().toISOString().replace(/[-:]/g,"").replace(/\.\d+/,""); const bmd=Math.min(Math.max(1,+svc.day||1),28); const sum="Pagar "+(svc.name||"servicio")+" — "+money(svc.amount);
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Iris//Servicios//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VEVENT","UID:svc-"+svc.id+"@iris.app","DTSTAMP:"+stamp,"DTSTART;VALUE=DATE:"+d,"RRULE:FREQ=MONTHLY;BYMONTHDAY="+bmd,"SUMMARY:"+icsEsc(sum),"BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc("Pagar "+(svc.name||"servicio")),"TRIGGER:PT9H","END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n"); }
function addServiceToCalendar(id){ const s=S.services.find(x=>x.id===id); if(!s)return; dlICS(svcICS(s),"pagar_"+(s.name||"servicio")); }
function renderHomeServices(){ const host=$("#home-services"); if(!host)return; const pend=pendingServices(); if(!pend.length){ host.innerHTML=""; host.style.display="none"; return; } host.style.display="";
  host.innerHTML=`<div class="card"><div class="card-t" style="margin-bottom:8px">Servicios por pagar</div>`+pend.map(s=>{ const inf=svcInfo(s); const tag=inf.status==="vencido"?`<span class="svc-tag over">Vencido</span>`:inf.status==="hoy"?`<span class="svc-tag today">Hoy</span>`:`<span class="svc-tag soon">En ${inf.diff} día${inf.diff===1?"":"s"}</span>`;
    return `<div class="row"><span class="mv-ico">${svgIco("receipt")}</span><div class="row-main"><div class="row-title">${esc(s.name)} ${tag}</div><div class="row-sub">${money(s.amount)} · vence ${inf.due.toLocaleDateString("es-AR",{day:"numeric",month:"short"})}</div></div><button class="sv-btn accent" data-act="pay-service" data-id="${s.id}" style="width:auto;padding:8px 14px">Pagar</button></div>`; }).join("")+`</div>`; }
function renderHomeNotes(){ const host=$("#home-notes"); if(!host)return; const list=(S.notes||[]).map(n=>`<div class="row"><div class="row-main"><div class="row-title">${esc(n.text)}</div></div><button class="x-row" data-act="del-note" data-id="${n.id}">×</button></div>`).join("")||`<div class="empty" style="padding:6px 0">Sin notas.</div>`;
  host.innerHTML=`<div class="card"><div class="card-t" style="margin-bottom:8px">Notas</div>${list}<div style="display:flex;gap:8px;margin-top:10px"><input id="note-input" placeholder="Nueva nota…" style="flex:1;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:inherit;font:inherit"><button class="btn primary" data-act="add-note" style="width:auto;padding:0 18px">+</button></div></div>`; }
function openDay(ds){
  _selDay=ds; renderCalendars();
  const dd=new Date(ds+"T00:00");
  const lbl=ds===todayISO()?"Hoy":cap1(dd.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"}));
  const ev=S.events.filter(e=>e.date===ds).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const tk=S.tasks.filter(t=>t.date===ds);
  const mv=S.moves.filter(x=>x.date===ds);
  let body="";
  if(ev.length){ body+=`<div class="card-t" style="margin:4px 0 6px">Eventos</div>`+ev.map(e=>`<div class="row"><span class="dot" style="background:var(--accent)"></span><div class="row-main" data-act="edit-ev" data-id="${e.id}" style="cursor:pointer"><div class="row-title">${esc(e.title)}</div></div><span class="row-time">${e.time||""}</span><button class="x-row" data-act="cal-ev" data-id="${e.id}" title="Recordarme" style="color:var(--accent)">${svgIco("bell")}</button></div>`).join(""); }
  if(tk.length){ body+=`<div class="card-t" style="margin:12px 0 6px">Tareas</div>`+tk.map(t=>`<div class="row ${t.done?"done":""}"><span class="dot" style="background:var(--violet)"></span><div class="row-main"><div class="row-title">${esc(t.title)}</div></div></div>`).join(""); }
  if(mv.length){ body+=`<div class="card-t" style="margin:12px 0 6px">Movimientos</div>`+mv.map(x=>`<div class="row" data-act="edit-mov" data-id="${x.id}" style="cursor:pointer"><span class="mv-ico">${catIco(x.cat,x.type==="ingreso")}</span><div class="row-main"><div class="row-title">${esc(x.title||x.cat||"Movimiento")}</div></div><span class="mv-amt ${x.type==="ingreso"?"up":"down"}">${x.type==="ingreso"?"+":"−"}${money(x.amount)}</span></div>`).join(""); }
  if(!body) body=`<div class="empty">Nada este día. Agregá abajo 👇</div>`;
  const sm=daySummary(ds);
  const dsum=`<div class="day-summary"><div class="day-sum"><div class="lbl">Ingresos</div><div class="v" style="color:var(--ok)">${money(sm.inc)}</div></div><div class="day-sum"><div class="lbl">Gastos</div><div class="v">${money(sm.exp)}</div></div><div class="day-sum"><div class="lbl">Balance</div><div class="v" style="${sm.bal<0?"color:var(--danger)":""}">${money(sm.bal)}</div></div></div>`;
  showPop(`<div class="pop-h"><div class="pop-t">${lbl}</div><button class="pop-x" data-act="close">✕</button></div>${dsum}${body}
    <div class="pop-actions"><button class="btn block" data-add="mov" data-date="${ds}">+ Movimiento</button><button class="btn primary block" data-add="event" data-date="${ds}">+ Evento</button></div>
    <button class="btn ghost block" data-add="task" data-date="${ds}" style="margin-top:8px">+ Tarea</button>`);
}

/* ---- AGENDA (calendario glass) ---- */
function renderCalendars(){ renderCalInto("cal-grid","cal-title"); renderCalInto("home-cal-grid","home-cal-title"); }
function renderCalInto(gridId,titleId){
  const grid=document.getElementById(gridId); if(!grid)return;
  const y=_calRef.getFullYear(), m=_calRef.getMonth();
  const tt=document.getElementById(titleId); if(tt) tt.textContent=_calRef.toLocaleDateString("es-AR",{month:"long",year:"numeric"});
  const startDow=(new Date(y,m,1).getDay()+6)%7, days=new Date(y,m+1,0).getDate();
  let html=["L","M","M","J","V","S","D"].map(d=>`<div class="cal-dow">${d}</div>`).join("");
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const ev=S.events.some(e=>e.date===ds), tk=S.tasks.some(t=>t.date===ds&&!t.done), mv=S.moves.some(x=>x.date===ds);
    const dots=(ev?`<i style="color:var(--accent)"></i>`:"")+(tk?`<i style="color:var(--violet)"></i>`:"")+(mv?`<i style="color:var(--cyan)"></i>`:"");
    const cls=["cal-day"]; if(ev||tk||mv)cls.push("has"); if(ds===todayISO())cls.push("today"); if(ds===_selDay)cls.push("sel");
    html+=`<div class="${cls.join(" ")}" data-day="${ds}"><span>${d}</span><span class="cal-dots">${dots}</span></div>`;
  }
  grid.innerHTML=html;
}

/* ---- gráfico "cómo voy" (balance acumulado del mes) ---- */
function renderHomeChart(){
  const box=document.getElementById("home-chart"); if(!box)return;
  const m=thisMonth(), today=new Date().getDate();
  const daily=Array(today).fill(0);
  S.moves.filter(x=>x.date&&x.date.slice(0,7)===m).forEach(x=>{ const d=+x.date.slice(8,10); if(d>=1&&d<=today) daily[d-1]+=(x.type==="ingreso"?1:-1)*(+x.amount||0); });
  let cum=0; const vals=daily.map(v=>cum+=v);
  if(vals.length<2 || vals.every(v=>v===0)){ box.innerHTML=`<div class="chart-empty">Cargá movimientos y acá vas a ver tu progreso del mes.</div>`; return; }
  const W=100,H=40, min=Math.min(0,...vals), max=Math.max(0,...vals), rng=(max-min)||1;
  const X=i=>vals.length>1?(i/(vals.length-1))*W:0, Y=v=>H-((v-min)/rng)*H;
  const pts=vals.map((v,i)=>`${X(i).toFixed(2)},${Y(v).toFixed(2)}`).join(" ");
  const area=`0,${H} `+pts+` ${W},${H}`;
  const zeroY=Y(0).toFixed(2);
  box.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b8cff" stop-opacity="0.45"/><stop offset="1" stop-color="#5b8cff" stop-opacity="0"/></linearGradient></defs>
    <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="rgba(255,255,255,.18)" stroke-width="0.5" stroke-dasharray="2 2"/>
    <polygon points="${area}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="#7b9fff" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ---- AGENDA (lista por día) ---- */
function addDaysISO(d,n){ const x=new Date(d+"T00:00"); x.setDate(x.getDate()+n); return iso(x); }
function cap1(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }
function renderAgenda(){
  const ti=todayISO(), map={};
  const add=(date,key,item)=>{ if(!date)return; (map[date]=map[date]||{events:[],tasks:[]})[key].push(item); };
  S.events.forEach(e=>add(e.date,"events",e));
  S.tasks.forEach(t=>add(t.date,"tasks",t));
  let dates=Object.keys(map).filter(d=> d>=ti || (map[d].tasks||[]).some(t=>!t.done));
  if(!dates.includes(ti)) dates.push(ti);
  const limit=addDaysISO(ti,60);
  dates=[...new Set(dates)].filter(d=>d<=limit).sort();
  let html="";
  let curMonth=null, printed=0;
  dates.forEach(d=>{
    const dd=new Date(d+"T00:00"), isToday=d===ti, isPast=d<ti;
    const ev=((map[d]&&map[d].events)||[]).slice().sort((a,b)=>(a.time||"").localeCompare(b.time||""));
    let tk=((map[d]&&map[d].tasks)||[]); if(isPast) tk=tk.filter(t=>!t.done);
    let items="";
    ev.forEach(e=>{ items+=`<div class="ag-ev ${e.time?"timed":""}"><span class="ag-t" data-act="edit-ev" data-id="${e.id}" style="cursor:pointer">${esc(e.title)}</span>${e.time?`<span class="ag-time">${e.time}</span>`:""}<button class="ag-x" data-act="cal-ev" data-id="${e.id}" title="Recordarme">${svgIco("bell")}</button><button class="ag-x" data-act="del-event" data-id="${e.id}">×</button></div>`; });
    tk.forEach(t=>{ items+=`<div class="ag-task ${t.done?"done":""}"><button class="check ${t.done?"done":""}" data-act="toggle-task" data-id="${t.id}">${t.done?CHK:""}</button><span class="ag-t">${esc(t.title)}</span><button class="ag-x" data-act="del-task" data-id="${t.id}">×</button></div>`; });
    if(!items){ if(isToday) items=`<div class="ag-none">Nada agendado hoy.</div>`; else return; }
    const mk=d.slice(0,7); if(mk!==curMonth){ curMonth=mk; html+=`<div class="ag-month">${cap1(dd.toLocaleDateString("es-AR",{month:"long",year:"numeric"}))}</div>`; }
    const dow=cap1(dd.toLocaleDateString("es-AR",{weekday:"short"}).replace(".","")).slice(0,3);
    html+=`<div class="ag-day" id="ag-${d}"><div class="ag-date ${isToday?"today":(isPast?"overdue":"")}"><div class="ag-dow">${isToday?"Hoy":dow}</div><div class="ag-num">${dd.getDate()}</div></div><div class="ag-items">${items}</div></div>`;
    printed++;
  });
  if(!printed) html+=`<div class="empty">Nada agendado. Tocá + para crear un evento o tarea.</div>`;
  $("#ag-list").innerHTML=html;
  renderAgendaTasks(); applyAgTab();
}
function applyAgTab(){ const a=$("#ag-view-agenda"),t=$("#ag-view-tareas"); if(a)a.style.display=_agtab==="tareas"?"none":""; if(t)t.style.display=_agtab==="tareas"?"":"none"; document.querySelectorAll("#ag-seg button").forEach(b=>b.classList.toggle("on",b.dataset.agtab===_agtab)); }
function renderAgendaTasks(){ const host=$("#ag-tasks"); if(!host)return; const pr={alta:0,media:1,baja:2};
  const pend=S.tasks.filter(t=>!t.done).slice().sort((a,b)=>(pr[a.priority||"media"]-pr[b.priority||"media"])||((a.date||"9999").localeCompare(b.date||"9999")));
  const done=S.tasks.filter(t=>t.done);
  let h=`<div class="card-t" style="margin-bottom:8px">Pendientes</div>`+(pend.length?pend.map(taskRow).join(""):`<div class="empty" style="padding:8px 0">Sin tareas pendientes 🎉</div>`);
  if(done.length){ h+=`<div class="card-t" style="margin:16px 0 8px">Hechas</div>`+done.map(taskRow).join(""); }
  h+=`<button class="btn primary block" style="margin-top:16px" data-act="add-task">+ Nueva tarea</button>`;
  host.innerHTML=h;
}

/* ---- FINANZAS ---- */
function catTotals(){ const f=monthFin(),o={}; f.mm.filter(x=>x.type==="gasto").forEach(x=>{o[x.cat]=(o[x.cat]||0)+(+x.amount||0);}); return o; }
function recoTips(){
  const f=monthFin(), tips=[];
  if(f.income<=0 && f.expense<=0){ return [["💡","Cargá tus ingresos y gastos del mes y Iris te arma recomendaciones a tu medida."]]; }
  if(f.income>0){
    if(f.rate<0) tips.push(["⚠️","Estás gastando <b>más de lo que entra</b> este mes. Frená 1–2 gastos grandes para no endeudarte."]);
    else if(f.rate<20) tips.push(["🎯",`Ahorrás <b>${f.rate}%</b>. Apuntá al 20% (regla 50/30/20): apartá ese monto apenas cobrás, antes de gastar.`]);
    else tips.push(["✅",`Buen ritmo: ahorrás <b>${f.rate}%</b>. Armá un fondo de emergencia de 3–6 meses de gastos.`]);
  }
  const top=Object.entries(catTotals()).sort((a,b)=>b[1]-a[1])[0];
  if(top) tips.push(["📊",`Tu mayor gasto es <b>${top[0]}</b> (${money(top[1])}). Recortar 15% ahí te libera ${money(top[1]*0.15)} al mes.`]);
  const debt=S.debts.reduce((a,b)=>a+(+b.amount||0),0);
  if(debt>0) tips.push(["💸",`Tenés <b>${money(debt)}</b> en deudas. Pagarlas suele rendir más que ahorrar: priorizá la de mayor interés.`]);
  if(!S.savings.length) tips.push(["🏦","Creá una <b>meta de ahorro</b> en la pestaña Ahorros para darle un objetivo concreto a tu plata."]);
  return tips.slice(0,4);
}
function finSeries(){
  const m=thisMonth(), today=new Date().getDate();
  const inc=Array(today).fill(0), exp=Array(today).fill(0);
  S.moves.filter(x=>x.date&&x.date.slice(0,7)===m).forEach(x=>{ const d=+x.date.slice(8,10); if(d>=1&&d<=today){ if(x.type==="ingreso")inc[d-1]+=(+x.amount||0); else exp[d-1]+=(+x.amount||0); } });
  let ai=0,ae=0; const cinc=[],cexp=[],cbal=[];
  for(let i=0;i<today;i++){ ai+=inc[i];ae+=exp[i];cinc.push(ai);cexp.push(ae);cbal.push(ai-ae); }
  return {cinc,cexp,cbal};
}
function spark(values,color){
  if(values.length<2) return "";
  const W=120,H=28, mx=Math.max.apply(null,values), mn=Math.min.apply(null,values), span=Math.max(1,mx-mn), step=W/(values.length-1);
  const pts=values.map((v,i)=>[i*step,3+(1-(v-mn)/span)*(H-6)]);
  const d="M"+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L ");
  const gid="sp"+Math.floor(Math.random()*1e6);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${d} L ${W} ${H} L 0 ${H} Z" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`;
}
function donutSVG(pct){
  const r=46, circ=2*Math.PI*r, p=Math.max(0,Math.min(100,pct));
  return `<svg viewBox="0 0 120 120" width="116" height="116" xmlns="http://www.w3.org/2000/svg">

    <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="11"/>

function prefillForm(type,ex){
  if(type==="mov"){ if($("#i-amount"))$("#i-amount").value=fmtMiles(ex.amount); if($("#i-date"))$("#i-date").value=ex.date||todayISO(); if($("#i-title"))$("#i-title").value=ex.title||"";
    if($("#i-cat")){ $("#i-cat").value=ex.cat||_draft.cat; _draft.cat=$("#i-cat").value; }
    document.querySelectorAll('#mov-type [data-pick="type"]').forEach(b=>b.classList.toggle("on",b.dataset.v===(ex.type||"gasto")));
    document.querySelectorAll('#mov-method [data-pick="method"]').forEach(b=>b.classList.toggle("on",b.dataset.v===(ex.method||"efectivo")));
    updateMovExtras(); if($("#i-who")&&ex.who)$("#i-who").value=ex.who; if($("#i-cuotas")&&ex.cuotas)$("#i-cuotas").value=ex.cuotas; if($("#i-card"))$("#i-card").value=ex.card||"";
  } else if(type==="event"){ if($("#i-title"))$("#i-title").value=ex.title||""; if($("#i-date"))$("#i-date").value=ex.date||todayISO(); if($("#i-time"))$("#i-time").value=ex.time||""; if($("#i-note"))$("#i-note").value=ex.note||"";
  } else if(type==="task"){ if($("#i-title"))$("#i-title").value=ex.title||""; if($("#i-date"))$("#i-date").value=ex.date||todayISO(); if($("#i-time"))$("#i-time").value=ex.time||""; if($("#i-priority"))$("#i-priority").value=ex.priority||"media";
  } else if(type==="shop"){ if($("#i-title"))$("#i-title").value=ex.name||""; if($("#i-qty"))$("#i-qty").value=ex.qty||1;
  } else if(type==="saving"){ if($("#i-title"))$("#i-title").value=ex.name||""; if($("#i-target"))$("#i-target").value=fmtMiles(ex.target); if($("#i-saved"))$("#i-saved").value=fmtMiles(ex.saved);
  } else if(type==="debt"||type==="loan"){ if($("#i-who"))$("#i-who").value=ex.who||""; if($("#i-amount"))$("#i-amount").value=fmtMiles(ex.amount); if($("#i-note"))$("#i-note").value=ex.note||"";
  } else if(type==="service"){ if($("#i-title"))$("#i-title").value=ex.name||""; if($("#i-amount"))$("#i-amount").value=fmtMiles(ex.amount); if($("#i-day"))$("#i-day").value=ex.day||""; _draft.smethod=ex.method||"transferencia"; document.querySelectorAll('#svc-method [data-pick="smethod"]').forEach(b=>b.classList.toggle("on",b.dataset.v===_draft.smethod));
  } else if(type==="card"){ if($("#i-title"))$("#i-title").value=ex.name||""; if($("#i-cierre"))$("#i-cierre").value=ex.cierre||""; if($("#i-limit"))$("#i-limit").value=fmtMiles(ex.limit); }
  const pt=document.querySelector("#pop .pop-t"); if(pt){ const T={mov:"Editar movimiento",event:"Editar evento",task:"Editar tarea",shop:"Editar artículo",saving:"Editar meta",debt:"Editar deuda",loan:"Editar préstamo",service:"Editar servicio",card:"Editar tarjeta"}; if(T[type])pt.textContent=T[type]; }
}
function syncCats(){ const w=$("#i-cat"); if(!w)return; const cats=(_draft.type==="ingreso"?S.catIngreso:S.catGasto)||[];
  let cur=w.value||_draft.cat; if(!cats.includes(cur))cur=cats[0]; _draft.cat=cur;
  w.innerHTML=cats.map(c=>`<option value="${esc(c)}" ${c===cur?"selected":""}>${esc(c)}</option>`).join(""); }
function updateMovExtras(){ if(!$("#i-cat"))return; const cat=($("#i-cat").value)||_draft.cat||""; const isCard=_draft.method==="tarjeta"&&_draft.type==="gasto"; const cw=$("#f-cuotas-wrap"); if(cw)cw.style.display=isCard?"":"none"; const cardw=$("#f-card-wrap"); if(cardw)cardw.style.display=isCard?"":"none"; const sel=$("#i-card"); if(sel&&isCard){ const cur=_draft.card||sel.value||""; sel.innerHTML=`<option value="">Sin tarjeta</option>`+(S.cards||[]).map(c=>`<option value="${c.id}" ${c.id===cur?"selected":""}>${esc(c.name)}</option>`).join(""); sel.value=cur; } const isPrestado=cat==="Prestado"; const pw=$("#f-prestamo-wrap"); if(pw)pw.style.display=isPrestado?"":"none"; const lbl=$("#i-who-lbl"); if(lbl)lbl.textContent=_draft.type==="ingreso"?"¿Quién te devolvió?":"¿A quién le prestaste?"; }

function doSave(type){
  const v=id=>{const e=$("#"+id);return e?e.value.trim():"";};
  const num=id=>{const e=$("#"+id);return e?parseInt((e.value||"").replace(/[^\d]/g,""),10)||0:0;};
  if(type==="task"){ if(!v("i-title"))return; const dt=$("#i-date").value||""; const tm=($("#i-time")&&$("#i-time").value)||""; const pr=($("#i-priority")&&$("#i-priority").value)||"media"; if(_editId){ const t=S.tasks.find(x=>x.id===_editId); if(t){ t.title=v("i-title"); t.date=dt; t.time=tm; t.priority=pr; } } else { S.tasks.push({id:uid(),title:v("i-title"),date:dt,time:tm,done:false,priority:pr}); } }
  else if(type==="event"){ if(!v("i-title"))return; if(_editId){ const ev=S.events.find(x=>x.id===_editId); if(ev){ ev.title=v("i-title"); ev.date=$("#i-date").value||todayISO(); ev.time=$("#i-time").value||""; ev.note=v("i-note"); } } else { S.events.push({id:uid(),title:v("i-title"),date:$("#i-date").value||todayISO(),time:$("#i-time").value||"",note:v("i-note")}); } }
  else if(type==="shop"){ if(!v("i-title"))return; const q=Math.max(1,parseInt(($("#i-qty")&&$("#i-qty").value)||"1",10)||1); if(_editId){ const s=S.shop.find(x=>x.id===_editId); if(s){ s.name=v("i-title"); s.qty=q; } } else { S.shop.push({id:uid(),name:v("i-title"),qty:q,done:false}); } }
  else if(type==="mov"){ const a=num("i-amount"); if(a<=0)return; const c=($("#i-cat")&&$("#i-cat").value)||_draft.cat||"Otros"; const tp=_draft.type||"gasto"; const mth=_draft.method||"efectivo"; const dt=$("#i-date").value||todayISO(); let ttl=v("i-title"); const who=(c==="Prestado"&&$("#i-who"))?$("#i-who").value.trim():""; const card=(mth==="tarjeta"&&tp==="gasto"&&$("#i-card"))?$("#i-card").value:"";
    if(_editId){ const m=S.moves.find(x=>x.id===_editId); if(m){ m.type=tp; m.amount=a; m.cat=c; m.method=mth; m.date=dt; m.title=ttl; m.who=who; m.card=card; } }
    else { if(who){ ttl=(ttl?ttl+" \u00b7 ":"")+(tp==="ingreso"?"Devuelto por "+who:"Prestado a "+who); }
      let ncu=1; if(tp==="gasto"&&mth==="tarjeta"&&$("#i-cuotas")){ ncu=Math.max(1,Math.min(60,parseInt($("#i-cuotas").value,10)||1)); }
      if(tp==="gasto"&&mth==="tarjeta"&&ncu>1){ const per=Math.round(a/ncu); const first=a-per*(ncu-1); const gid=uid(); for(let k=0;k<ncu;k++){ S.moves.push({id:uid(),type:"gasto",amount:k===0?first:per,cat:c,method:"tarjeta",title:(ttl?ttl+" \u00b7 ":"")+"Cuota "+(k+1)+"/"+ncu,date:addMonthsISO(dt,k),cuotas:ncu,cuotaIndex:k+1,grp:gid,who:who,card:card}); } }
      else { S.moves.push({id:uid(),type:tp,amount:a,cat:c,method:mth,title:ttl,date:dt,who:who,card:card}); } } }
  else if(type==="saving"){ if(!v("i-title"))return; if(_editId){ const g=S.savings.find(x=>x.id===_editId); if(g){ g.name=v("i-title"); g.target=num("i-target"); g.saved=num("i-saved"); } } else { S.savings.push({id:uid(),name:v("i-title"),target:num("i-target"),saved:num("i-saved")}); } }
  else if(type==="debt"){ if(!v("i-who"))return; if(_editId){ const d=S.debts.find(x=>x.id===_editId); if(d){ d.who=v("i-who"); d.amount=num("i-amount"); d.note=v("i-note"); } } else { S.debts.push({id:uid(),who:v("i-who"),amount:num("i-amount"),note:v("i-note")}); } }
  else if(type==="loan"){ if(!v("i-who"))return; if(_editId){ const d=S.loans.find(x=>x.id===_editId); if(d){ d.who=v("i-who"); d.amount=num("i-amount"); d.note=v("i-note"); } } else { S.loans.push({id:uid(),who:v("i-who"),amount:num("i-amount"),note:v("i-note")}); } }
  else if(type==="service"){ if(!v("i-title"))return; let day=parseInt(($("#i-day")&&$("#i-day").value)||"1",10); if(!(day>=1&&day<=31))day=1; if(_editId){ const s=S.services.find(x=>x.id===_editId); if(s){ s.name=v("i-title"); s.amount=num("i-amount"); s.day=day; s.method=_draft.smethod||"transferencia"; } } else { S.services.push({id:uid(),name:v("i-title"),amount:num("i-amount"),day:day,method:_draft.smethod||"transferencia",lastPaid:""}); } }
  else if(type==="card"){ if(!v("i-title"))return; let ci=parseInt(($("#i-cierre")&&$("#i-cierre").value)||"",10); if(!(ci>=1&&ci<=31))ci=0; const lim=num("i-limit"); if(_editId){ const cc=S.cards.find(x=>x.id===_editId); if(cc){ cc.name=v("i-title"); cc.cierre=ci; cc.limit=lim; } } else { S.cards.push({id:uid(),name:v("i-title"),cierre:ci,limit:lim}); } }
  save(); closePop(); render(); _editId=null;
}

/* ---- AJUSTES (pestañas) ---- */
let _ajtab="general";
const ACCENTS=["#5b8cff","#a78bfa","#22d3ee","#3ddc97","#ffc861","#ff6b6b","#ff8fab"];
function _lighten(hex,amt){ let h=(hex||"#5b8cff").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join(""); let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); const f=amt>=0?(c=>c+(255-c)*amt):(c=>c*(1+amt)); const cl=c=>Math.max(0,Math.min(255,Math.round(c))).toString(16).padStart(2,"0"); return "#"+cl(f(r))+cl(f(g))+cl(f(b)); }
function applyAccent(){ const a=(S.set&&S.set.accent)||"#5b8cff"; const s=document.documentElement.style; s.setProperty("--accent",a); s.setProperty("--grad","linear-gradient(135deg,"+a+","+_lighten(a,0.30)+")"); s.setProperty("--grad-bv","linear-gradient(135deg,"+_lighten(a,-0.10)+","+_lighten(a,0.34)+")"); }
function applyAnim(){ document.body.classList.toggle("no-anim", !(S.set&&S.set.anim)); }
function collap(title,inner,key,defOpen){ const c=(S.set&&S.set.collapsed)||{}; const open=(key in c)?!!c[key]:!!defOpen; return `<details class="card collap" data-collap="${key}"${open?" open":""}><summary>${title}</summary><div class="collap-b">${inner}</div></details>`; }
document.addEventListener("toggle",e=>{ const d=e.target; if(d&&d.tagName==="DETAILS"&&d.dataset&&d.dataset.collap){ if(!S.set.collapsed)S.set.collapsed={}; if(S.set.collapsed[d.dataset.collap]!==d.open){ S.set.collapsed[d.dataset.collap]=d.open; save(); } } },true);
function moveCat(kind,name,dir){ const list=kind==="gasto"?S.catGasto:S.catIngreso; const i=list.indexOf(name); const j=i+dir; if(i<0||j<0||j>=list.length)return; const t=list[i]; list[i]=list[j]; list[j]=t; save(); renderAjustes(); }
function catEditor(kind){
  const list=(kind==="gasto"?S.catGasto:S.catIngreso)||[];
  const items=list.map((c,idx)=>`<div class="cat-item"><span class="cat-dot" style="background:${catColor(c)}"></span><input class="cat-edit" data-kind="${kind}" data-old="${esc(c)}" value="${esc(c)}" maxlength="24"><button class="cat-move" data-act="cat-up" data-kind="${kind}" data-cat="${esc(c)}" aria-label="Subir" ${idx===0?"disabled":""}>▲</button><button class="cat-move" data-act="cat-down" data-kind="${kind}" data-cat="${esc(c)}" aria-label="Bajar" ${idx===list.length-1?"disabled":""}>▼</button><button class="cat-x" data-act="del-cat" data-kind="${kind}" data-cat="${esc(c)}" aria-label="Eliminar ${esc(c)}">×</button></div>`).join("");
  return `<div class="cat-list">${items||`<div class="muted">Sin categorías.</div>`}</div>
    <div class="cat-add"><input id="new-cat-${kind}" placeholder="Nueva categoría…" maxlength="24"><button data-act="add-cat" data-kind="${kind}">Agregar</button></div>`;
}

  } else if(_ajtab==="conectividad"){
    const li=(typeof loggedIn==="function")&&loggedIn();
    const acctTitle=li?"Cuenta · sincronización ✓":"Cuenta · sincronizar entre dispositivos";
    const acctInner = li
      ? `<div class="muted" style="margin-bottom:10px">Sesión iniciada como <b>${esc((_sess&&_sess.user&&_sess.user.email)||"")}</b>. Tus datos se sincronizan solos en todos tus dispositivos donde inicies sesión.</div>
          <button class="btn block" data-act="sync-now">Sincronizar ahora</button>
          <button class="btn block" data-act="auth-signout" style="margin-top:8px;color:var(--danger)">Cerrar sesión</button>
          <div id="sync-status" class="muted" style="margin-top:10px;font-size:11px"></div>`
      : `<div class="muted" style="margin-bottom:10px">Creá una cuenta (o entrá) y tus datos se sincronizan <b>automáticamente</b> en tu teléfono, tablet y compu. La clave de Gemini no se sincroniza (queda en cada dispositivo).</div>
          <div class="field"><label>Email</label><input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="vos@email.com"></div>
          <div class="field"><label>Contraseña</label><input id="auth-pass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres"></div>
          <button class="btn primary block" data-act="auth-signin">Entrar</button>
          <button class="btn block" data-act="auth-signup" style="margin-top:8px">Crear cuenta nueva</button>
          <div id="auth-status" class="muted" style="margin-top:10px;font-size:11px"></div>`;
    let scInner;

function addCat(kind){

}
function delCat(kind,name){

  const i=list.indexOf(name); if(i>=0)list.splice(i,1);
  if(!list.length)list.push("Otro");

function renameCat(kind,oldName,newName){
  newName=(newName||"").trim();
  const list=kind==="gasto"?S.catGasto:S.catIngreso;
  const i=list.indexOf(oldName); if(i<0){renderAjustes();return;}

  if(list.some(c=>c.toLowerCase()===newName.toLowerCase()&&c!==oldName)){ list.splice(i,1); } else { list[i]=newName; }

}

document.addEventListener("input",e=>{

  const raw=t.value.replace(/[^\d]/g,"").replace(/^0+(?=\d)/,"");
  const formatted=raw?raw.replace(/\B(?=(\d{3})+(?!\d))/g,"."):"";
  if(formatted===t.value)return;

  let pos=0,seen=0; while(pos<formatted.length&&seen<digitsBefore){ const c=formatted.charCodeAt(pos); if(c>=48&&c<=57)seen++; pos++; }
  try{t.setSelectionRange(pos,pos);}catch(_){}
});

const AKEY="iris.auth";
let _sess=null; try{ _sess=JSON.parse(localStorage.getItem(AKEY)||"null"); }catch(_){}
let _syncTimer=null,_syncBusy=false,_syncDirty=false,_syncPoll=null,_lastTs=null;
function loggedIn(){ return !!(_sess&&_sess.access_token&&_sess.user&&_sess.user.id); }
function saveSess(s){ _sess=s; try{ if(s)localStorage.setItem(AKEY,JSON.stringify(s)); else localStorage.removeItem(AKEY); }catch(_){} }
function _mkSess(d){ return { access_token:d.access_token, refresh_token:d.refresh_token, expires_at:Date.now()+((d.expires_in||3600)*1000), user:{ id:d.user&&d.user.id, email:d.user&&d.user.email } }; }
function _authMark(m){ const el=$("#auth-status"); if(el)el.textContent=m; }
function _syncMark(m){ const el=$("#sync-status"); if(el)el.textContent=m; }
function authHeaders(json){ const h={apikey:SUPA_KEY,Authorization:"Bearer "+((_sess&&_sess.access_token)||SUPA_KEY)}; if(json)h["Content-Type"]="application/json"; return h; }
async function authRefresh(){ if(!_sess||!_sess.refresh_token)return false; try{ const r=await fetch(SUPA_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:_sess.refresh_token})}); if(!r.ok){ if(r.status>=400&&r.status<500)saveSess(null); return false; } saveSess(_mkSess(await r.json())); return true; }catch(_){ return false; } }
async function authedFetch(url,opt,retry){ opt=opt||{}; opt.headers=Object.assign(authHeaders(!!opt.body),opt.headers||{}); if(!retry && _sess&&_sess.expires_at && Date.now()>_sess.expires_at-30000){ await authRefresh(); opt.headers=Object.assign(authHeaders(!!opt.body),opt.headers||{}); } let r=await fetch(url,opt); if(r.status===401 && !retry){ if(await authRefresh())return authedFetch(url,opt,true); } return r; }
function _authErr(d){ const m=(d&&(d.msg||d.error_description||d.error||d.message))||"Error"; if(/already registered|already exists/i.test(m))return "Ese email ya tiene cuenta. Probá Entrar."; if(/invalid login|invalid credentials/i.test(m))return "Email o contraseña incorrectos."; if(/email not confirmed/i.test(m))return "Confirmá tu email (revisá tu casilla) y volvé a entrar."; if(/password/i.test(m)&&/6/.test(m))return "La contraseña necesita al menos 6 caracteres."; return m; }
async function _authPwd(path,msg){
  const email=(($("#auth-email")||{}).value||"").trim().toLowerCase();
  const pw=(($("#auth-pass")||{}).value||"");
  if(!/.+@.+\..+/.test(email)){ _authMark("Poné un email válido"); return; }
  if(pw.length<6){ _authMark("La contraseña necesita 6+ caracteres"); return; }
  _authMark(msg);
  try{
    const r=await fetch(SUPA_URL+"/auth/v1/"+path,{method:"POST",headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ _authMark(_authErr(d)); return; }
    if(!d.access_token){ _authMark("Cuenta creada. Te mandamos un email para confirmarla: tocá el link y después entrá."); return; }
    saveSess(_mkSess(d)); _authMark(""); renderAjustes(); await syncOnLogin();
  }catch(_){ _authMark("Sin conexión"); }
}
